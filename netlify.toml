[build]
publish = "."
functions = "netlify/functions"

[functions]
node_bundler = "esbuild"
included_files = ["backend/data/state.json"]

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200
force = true

[[redirects]]
from = "/"
to = "/carrier-database.html"
status = 200
